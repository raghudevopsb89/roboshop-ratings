[pytest]
# Ensure the top-level app module (app.py) is importable regardless of how pytest
# is invoked (`pytest` console-script or `python -m pytest`).
pythonpath = .

# By DEFAULT, exclude integration tests so the unit run stays fast and Docker-free.
# Run integration tests explicitly with:  pytest -m integration
# (the command-line -m overrides this addopts -m, argparse last-wins).
addopts = -m "not integration"

markers =
    integration: component integration tests that require Docker / Testcontainers (real MySQL)
